model:
  default: qwen3.5-9b-mtp
  provider: custom:lmstudio
  base_url: http://localhost:1234/v1
  context_length: 90000
  max_tokens: 4096
  api_mode: chat_completions
  # CRITICAL for native vision: Hermes only embeds screenshot pixels when the
  # model is declared vision-capable. A custom LM Studio model is NOT in
  # models.dev, so without this Hermes strips the image and hands the model
  # only a file PATH (text), and it "can't see" anything. Declaring it makes
  # run_agent._model_supports_vision() return True -> pixels stay in the tool
  # result. (image_input_mode: native below then skips the aux-vision call.)
  supports_vision: true
custom_providers:
  - name: lmstudio
    base_url: http://localhost:1234/v1
    api_key: lmstudio
    api_mode: chat_completions
    models:
      - gemma-4-12b-qat
    discover_models: true
toolsets:
  - hermes-cli
  - mcp:xdotool
computer_use:
  foreground: true
mcp_servers:
  xdotool:
    command: python3
    args:
      - /home/henry/.hermes/skills/desktop-control-xdotool/xdotool_mcp.py
    env:
      DISPLAY: :0
      # Which monitor screenshot(window_name="primary") / click(name="primary")
      # target. xrandr's "primary" flag (HDMI-1) is NOT Henry's real main screen
      # — his cursor/windows live on DP-2 (1920x1080 at +4480+360). Override the
      # connector here if the wrong monitor shows up. "primary" = xrandr flag.
      CUABOT_MONITOR: DP-2
agent:
  max_turns: 90
  gateway_timeout: 1800
  # native = embed images directly into the VLM (qwen3.5-9b-mtp); do NOT run the
  # slow auxiliary-vision text-summary roundtrip on screenshots.
  image_input_mode: native
auxiliary:
  vision:
    provider: lmstudio
    model: gemma-4-12b-qat
    base_url: http://localhost:1234/v1
    api_key: lmstudio
    timeout: 300
    context_length: 90000
  compression:
    model: gemma-4-12b-qat
    context_length: 90000
onboarding:
  seen:
    openclaw_residue_cleanup: true
    tool_progress_prompt: true
    busy_input_prompt: true
compression:
  enabled: true
approvals:
  destructive_slash_confirm: false

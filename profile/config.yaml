model:
  default: qwen3.5-9b-mtp
  provider: custom:lmstudio
  base_url: http://localhost:1234/v1
  context_length: 90000
  max_tokens: 4096
  api_mode: chat_completions
custom_providers:
  - name: lmstudio
    base_url: http://localhost:1234/v1
    api_key: lmstudio
    api_mode: chat_completions
    models:
      - qwen3.5-9b-mtp
    discover_models: true
toolsets:
  - hermes-cli
  - mcp:xdotool
computer_use:
  foreground: true
mcp_servers:
  xdotool:
    command: python3
    args:
      - /home/henry/.hermes/skills/desktop-control-xdotool/xdotool_mcp.py
    env:
      DISPLAY: :0
agent:
  max_turns: 90
  gateway_timeout: 1800
  # native = embed images directly into the VLM (qwen3.5-9b-mtp); do NOT run the
  # slow auxiliary-vision text-summary roundtrip on screenshots.
  image_input_mode: native
auxiliary:
  vision:
    provider: lmstudio
    model: qwen3.5-9b-mtp
    base_url: http://localhost:1234/v1
    api_key: lmstudio
    timeout: 300
    context_length: 90000
  compression:
    model: qwen3.5-9b-mtp
    context_length: 90000
onboarding:
  seen:
    openclaw_residue_cleanup: true
    tool_progress_prompt: true
    busy_input_prompt: true
compression:
  enabled: true
approvals:
  destructive_slash_confirm: false
